{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="hero-card text-center mb-4 p-4">
            <p class="hero-tag mb-2">Pulmoscan AI</p>
            <h1 class="h3 mb-2">Create Your Workspace</h1>
            <p class="mb-0 text-muted">Register to manage patients, scan history, and AI-generated diagnostic reports.</p>
        </div>
    </div>
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-3">Register</h3>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" minlength="6" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Create Account</button>
                </form>
                <p class="mt-3 mb-0">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
