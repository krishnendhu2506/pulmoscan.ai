{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Upload CT Scan</h2>
    <a class="btn btn-outline-primary" href="{{ url_for('add_patient') }}">Add Patient</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Select Patient</label>
                <select name="patient_id" class="form-select" required>
                    <option value="">Choose patient...</option>
                    {% for patient in patients %}
                    <option value="{{ patient.id }}">{{ patient.patient_uid }} - {{ patient.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">CT Scan Image (PNG/JPG/JPEG)</label>
                <input id="scan_image" type="file" name="scan_image" class="form-control" accept=".png,.jpg,.jpeg" required>
                <small class="text-muted d-block mt-1" id="scan_image_name">No file chosen.</small>
            </div>
            <button class="btn btn-primary" type="submit">Upload and Predict</button>
        </form>
    </div>
</div>
{% endblock %}
